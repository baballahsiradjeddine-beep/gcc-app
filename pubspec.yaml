  # connectivity_plus: ^6.0.3

  

dependency_overrides:
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.14.2
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/sounds/
    - assets/data/
  fonts:
    - family: SomarSans
      fonts:
        - asset: assets/fonts/SomarSans-Black.otf
          weight: 900
        - asset: assets/fonts/SomarSans-Bold.otf
          weight: 700
        - asset: assets/fonts/SomarSans-Regular.otf
          weight: 400
        - asset: assets/fonts/SomarSans-Light.otf
          weight: 300
        - asset: assets/fonts/SomarSans-Thin.otf
          weight: 100
        - asset: assets/fonts/SomarSans-BlackItalic.otf
          style: italic
          weight: 900
        - asset: assets/fonts/SomarSans-BoldItalic.otf
          style: italic
          weight: 700
        - asset: assets/fonts/SomarSans-RegularItalic.otf
          style: italic
          weight: 400
        - asset: assets/fonts/SomarSans-LightItalic.otf
          style: italic
          weight: 300
        - asset: assets/fonts/SomarSans-ThinItalic.otf
          style: italic
          weight: 100